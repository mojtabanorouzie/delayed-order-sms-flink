version: "3.8"

name: delayed-order-sms-flink

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"

      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824

    volumes:
      - kafka-data:/var/lib/kafka/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 10

    networks:
      - flink-lab

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      echo "Creating Kafka topics..."

      kafka-topics \
        --bootstrap-server kafka:29092 \
        --create \
        --if-not-exists \
        --topic Orders \
        --partitions 3 \
        --replication-factor 1 \
        --config cleanup.policy=compact \
        --config min.cleanable.dirty.ratio=0.01 \
        --config segment.ms=60000

      kafka-topics \
        --bootstrap-server kafka:29092 \
        --create \
        --if-not-exists \
        --topic sms-commands \
        --partitions 3 \
        --replication-factor 1

      kafka-topics \
        --bootstrap-server kafka:29092 \
        --create \
        --if-not-exists \
        --topic dead-letter-events \
        --partitions 3 \
        --replication-factor 1

      echo "Kafka topics created:"
      kafka-topics --bootstrap-server kafka:29092 --list

    networks:
      - flink-lab

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
      KAFKA_CLUSTERS_0_READONLY: "false"
    networks:
      - flink-lab

  flink-jobmanager:
    image: flink:1.19.1-scala_2.12-java17
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: 0.0.0.0
        rest.bind-address: 0.0.0.0

        parallelism.default: 1

        state.backend.type: rocksdb
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints

        execution.checkpointing.interval: 10000
        execution.checkpointing.mode: EXACTLY_ONCE
        execution.checkpointing.min-pause: 5000
        execution.checkpointing.timeout: 60000
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION

        taskmanager.numberOfTaskSlots: 4

    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints
      - ./flink-job/target:/opt/flink/usrlib

    networks:
      - flink-lab

  flink-taskmanager:
    image: flink:1.19.1-scala_2.12-java17
    container_name: flink-taskmanager
    hostname: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4

        state.backend.type: rocksdb
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints

    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints

    networks:
      - flink-lab

networks:
  flink-lab:
    driver: bridge

volumes:
  kafka-data:
  flink-checkpoints:
  flink-savepoints: